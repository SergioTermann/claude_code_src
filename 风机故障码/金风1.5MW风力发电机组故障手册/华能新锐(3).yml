          \    输出: {'result': '1'} 或 {'result': '0'}\n    \"\"\"\n    import json\n\
          \    import urllib.request\n    import socket\n\n    api_url = \"http://192.168.16.92:9518/v1/chat/completions\"\
          \n\n    payload = {\n        \"model\": \"qwen2.5-72b\",\n        \"messages\"\
          : [\n            {\n                \"role\": \"system\",\n            \
          \    \"content\": \"你是一个分类助手。判断问题是否属于运维类（服务器、网络、部署、监控等）。只回答1或0。\"\n    \
          \        },\n            {\n                \"role\": \"user\",\n      \
          \          \"content\": f\"问题：{user_input}\\n\\n是运维问题吗？只回答1或0。\"\n     \
          \       }\n        ],\n        \"temperature\": 0.1,\n        \"max_tokens\"\
          : 5\n    }\n\n    try:\n        req = urllib.request.Request(\n        \
          \    api_url,\n            data=json.dumps(payload).encode('utf-8'),\n \
          \           headers={'Content-Type': 'application/json'}\n        )\n\n\
          \        with urllib.request.urlopen(req, timeout=120) as response:\n  \
          \          result = json.loads(response.read().decode('utf-8'))\n\n    \
          \    answer = result['choices'][0]['message']['content'].strip()\n\n   \
          \     # 清洗输出\n        if '1' in answer:\n            return {'result': '1'}\n\
          \        elif '0' in answer:\n            return {'result': '0'}\n     \
          \   else:\n            return {'result': '0'}\n\n    except (socket.timeout,\
          \ urllib.error.URLError, urllib.error.HTTPError):\n        # 超时或网络错误，返回默认值\n\
          \        return {'result': '0'}\n\n    except Exception:\n        # 其他错误，返回默认值\n\
          \        return {'result': '0'}"
