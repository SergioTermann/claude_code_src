    - data:
        code: "def main(question: str) -> dict:\n    \"\"\"\n    Dify 工作流专用版本 - 流式接收但不打印，避免污染输出\n\
          \    \"\"\"\n    import json\n    import urllib.request\n\n    api_url =\
          \ \"http://192.168.16.92:9518/v1/chat/completions\"\n\n    payload = {\n\
          \        \"model\": \"qwen2.5-72b\",\n        \"messages\": [\n        \
          \    {\n                \"role\": \"user\",\n                \"content\"\
          : question\n            }\n        ],\n        \"temperature\": 0.7,\n \
          \       \"max_tokens\": 256,\n        \"stream\": True  # 开启流式输出\n    }\n\
          \n    full_text = \"\"  # 累积完整回复文本\n\n    try:\n        req = urllib.request.Request(\n\
          \            api_url,\n            data=json.dumps(payload).encode('utf-8'),\n\
          \            headers={'Content-Type': 'application/json'}\n        )\n\n\
          \        # 流式读取响应\n        with urllib.request.urlopen(req, timeout=180)\
          \ as response:\n            buffer = b\"\"  # 缓冲区，处理不完整的行\n            \n\
          \            while True:\n                # 每次读取一小块数据\n                chunk\
          \ = response.read(1024)\n                if not chunk:\n               \
          \     break\n                \n                buffer += chunk\n       \
          \         \n                # 按行分割\n                while b'\\n' in buffer:\n\
          \                    line, buffer = buffer.split(b'\\n', 1)\n          \
          \          line = line.decode('utf-8', errors='ignore').strip()\n      \
          \              \n                    # 跳过空行或非 data 行\n                 \
          \   if not line or not line.startswith('data: '):\n                    \
          \    continue\n                    \n                    data = line[6:]\
          \  # 去掉 \"data: \" 前缀\n                    \n                    # 遇到结束标志\n\
          \                    if data == '[DONE]':\n                        return\
          \ {\"result\": full_text}\n                    \n                    try:\n\
          \                        # 解析 JSON 数据块\n                        chunk_data\
          \ = json.loads(data)\n                        \n                       \
          \ # 提取增量内容（delta）\n                        choices = chunk_data.get('choices',\
          \ [])\n                        if choices:\n                           \
          \ delta = choices[0].get('delta', {})\n                            content\
          \ = delta.get('content', '')\n                            \n           \
          \                 if content:\n                                full_text\
          \ += content\n                                # 不打印，避免污染 Dify 工作流输出\n  \
          \                  \n                    except (json.JSONDecodeError, KeyError,\
          \ IndexError):\n                        # 忽略解析错误，继续处理下一行\n             \
          \           pass\n        \n        return {\"result\": full_text}\n\n \
          \   except Exception:\n        # 超时或出错时返回默认回复\n        return {\"result\"\
          : \"抱歉，我现在有点忙，请稍后再试。\"}"
